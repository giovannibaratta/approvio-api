    NotFound:
      $ref: ./openapi/shared/responses.yaml#/NotFound
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token containing authentication information for users or agents.
        The JWT payload includes: - Core JWT claims: iss (issuer), sub (subject ID), aud (audience), exp/iat/nbf (time claims), jti (token ID) - Standard claims: email (for users), name (display name) - Custom claims: entityType ("user" or "agent")
        Users must have a valid email, while agents do not require an email field. Permissions and roles are resolved server-side and not included in the token for security.
security:
  - bearerAuth: []
