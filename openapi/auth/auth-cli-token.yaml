post:
  summary: Exchange authorization code for CLI tokens
  description: Exchanges an IDP authorization code and state for a pair of access and refresh tokens, returned as JSON.
  operationId: exchangeCliToken
  tags:
    - Authentication
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/TokenRequest
  responses:
    "200":
      description: Tokens generated successfully
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/TokenResponse
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
