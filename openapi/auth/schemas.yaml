TokenRequest:
  type: object
  required:
    - code
    - state
  properties:
    code:
      type: string
      description: Authorization code returned by the IDP
    state:
      type: string
      description: State parameter passed to the IDP for CSRF protection
TokenResponse:
  type: object
  required:
    - accessToken
    - refreshToken
  properties:
    accessToken:
      type: string
      description: Access token for the authenticated user
    refreshToken:
      type: string
      description: Refresh token used to obtain a new access token
OidcCallbackRequest:
  type: object
  required:
    - code
    - state
  properties:
    code:
      type: string
      description: Authorization code received from OIDC provider
    state:
      type: string
      description: State parameter used for CSRF protection
RefreshTokenRequest:
  type: object
  required:
    - refreshToken
  properties:
    refreshToken:
      type: string
      description: Refresh token used to obtain a new access token
      example: sd8Axmi9Xkalsmcd...
PrivilegedTokenResponse:
  type: object
  required:
    - accessToken
  properties:
    accessToken:
      type: string
      description: Short-lived high-privilege JWT token for sensitive operations
      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
PrivilegedTokenExchangeRequest:
  type: object
  required:
    - code
    - state
    - operation
  properties:
    code:
      type: string
      description: The authorization code returned from the IDP
    state:
      type: string
      description: The state parameter returned from the IDP
    resourceId:
      type: string
      description: The identifier of the resource being accessed
    operation:
      $ref: ../shared/schemas.yaml#/PrivilegedOperation

GetEntityInfo200Response:
  description: Entity information response based on the authenticated entity type.
  oneOf:
    - $ref: "#/GetEntityInfoUserResponse"
    - $ref: "#/GetEntityInfoAgentResponse"
  discriminator:
    propertyName: entityType
    mapping:
      user: "#/GetEntityInfoUserResponse"
      agent: "#/GetEntityInfoAgentResponse"

GetEntityInfoUserResponse:
  type: object
  required:
    - id
    - entityType
    - groups
    - roles
    - orgRole
    - concurrencyControl
  properties:
    id:
      type: string
      format: uuid
      description: Internal unique identifier for the user.
    entityType:
      type: string
      enum:
        - user
      description: Type of the authenticated entity
      example: user
    groups:
      type: array
      items:
        $ref: ../groups/schemas.yaml#/GroupInfo
    roles:
      type: array
      items:
        $ref: ../roles/schemas.yaml#/RoleOperationItem
    orgRole:
      type: string
      enum:
        - admin
        - member
      description: Role assigned to the user within the organization.
    concurrencyControl:
      $ref: ../shared/schemas.yaml#/ConcurrencyControl

GetEntityInfoAgentResponse:
  type: object
  required:
    - id
    - entityType
    - groups
    - roles
  properties:
    id:
      type: string
      format: uuid
      description: Internal unique identifier for the agent.
    entityType:
      type: string
      enum:
        - agent
      description: Type of the authenticated entity
      example: agent
    groups:
      type: array
      items:
        $ref: ../groups/schemas.yaml#/GroupInfo
    roles:
      type: array
      items:
        $ref: ../roles/schemas.yaml#/RoleOperationItem
