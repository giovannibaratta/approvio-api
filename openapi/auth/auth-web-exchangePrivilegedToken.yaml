post:
  summary: Exchange Web privilege token
  description: Exchanges an IDP token for a high-privilege step-up token and sets it as an HttpOnly cookie.
  operationId: exchangePrivilegeTokenWeb
  tags:
    - Authentication
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/PrivilegedTokenExchangeRequest
  responses:
    "204":
      description: Privilege token set as cookie successfully
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
