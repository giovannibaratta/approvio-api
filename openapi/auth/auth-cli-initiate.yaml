post:
  summary: Initiate OIDC login for CLI
  description: Initiates OIDC authentication specifying a loopback redirect URI for the CLI
  operationId: initiateCliLogin
  tags:
    - Authentication
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/InitiateCliLoginRequest
  responses:
    "200":
      description: Authorization URL generated
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/InitiateCliLogin200Response
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
