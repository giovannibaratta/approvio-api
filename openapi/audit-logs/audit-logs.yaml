get:
  summary: List audit logs
  description: Returns a list of audit logs
  operationId: listAuditLogs
  tags:
    - Audit Logs
  parameters:
    - name: params
      in: query
      style: form
      explode: true
      schema:
        $ref: ./schemas.yaml#/ListAuditLogsParams
  responses:
    "200":
      description: List of audit logs
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/ListAuditLogs200Response
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "403":
      $ref: ../shared/responses.yaml#/Forbidden
    "500":
      $ref: ../shared/responses.yaml#/InternalServerError
