QuotaType:
  type: string
  enum:
    - MAX_ENTITIES_PER_GROUP
    - MAX_CONCURRENT_WORKFLOWS
    - MAX_ROLES_PER_USER
    - MAX_GROUPS
    - MAX_SPACES
    - MAX_WORKFLOW_TEMPLATES_PER_SPACE
    - MAX_VOTES_PER_WORKFLOW
  description: >
    The type of metric that this quota enforces.
    * `MAX_ENTITIES_PER_GROUP`: The maximum number of entities (users, agents) allowed in a group.
    * `MAX_CONCURRENT_WORKFLOWS`: The maximum number of workflow instances that can be in a non terminal status at the same for a workflow template.
    * `MAX_ROLES_PER_USER`: The maximum number of roles a user can have.
    * `MAX_GROUPS`: The maximum number of groups allowed in an organization.
    * `MAX_SPACES`: The maximum number of spaces allowed in an organization.
    * `MAX_WORKFLOW_TEMPLATES_PER_SPACE`: The maximum number of workflow templates allowed in a space.
    * `MAX_VOTES_PER_WORKFLOW`: The maximum number of votes allowed per workflow instance.

QuotaScope:
  type: string
  enum:
    - Org
    - Group
    - Space
    - WorkflowTemplate
    - Workflow
    - User
  description: The scope at which this quota applies.

QuotaBaseNew:
  type: object
  required:
    - limit
    - quotaType
    - scope
    - targetId
  properties:
    limit:
      type: integer
      minimum: 0
      description: The maximum value allowed for this quota
    quotaType:
      $ref: "#/QuotaType"
    scope:
      $ref: "#/QuotaScope"
    targetId:
      type: string
      format: uuid
      description: The ID of the target this quota applies to.

QuotaBase:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - type: object
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the quota
          readOnly: true
        createdAt:
          type: string
          format: date-time
          description: When the quota was created
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          description: When the quota was last updated
          readOnly: true

OrgQuotaBase:
  type: object
  properties:
    scope:
      type: string
      enum:
        - Org
    quotaType:
      type: string
      enum:
        - MAX_GROUPS
        - MAX_SPACES
        - MAX_ROLES_PER_USER
        - MAX_ENTITIES_PER_GROUP
        - MAX_WORKFLOW_TEMPLATES_PER_SPACE
        - MAX_CONCURRENT_WORKFLOWS
        - MAX_VOTES_PER_WORKFLOW

GroupQuotaBase:
  type: object
  properties:
    scope:
      type: string
      enum:
        - Group
    quotaType:
      type: string
      enum:
        - MAX_ENTITIES_PER_GROUP

SpaceQuotaBase:
  type: object
  properties:
    scope:
      type: string
      enum:
        - Space
    quotaType:
      type: string
      enum:
        - MAX_WORKFLOW_TEMPLATES_PER_SPACE
        - MAX_CONCURRENT_WORKFLOWS

WorkflowTemplateQuotaBase:
  type: object
  properties:
    scope:
      type: string
      enum:
        - WorkflowTemplate
    quotaType:
      type: string
      enum:
        - MAX_CONCURRENT_WORKFLOWS

WorkflowQuotaBase:
  type: object
  properties:
    scope:
      type: string
      enum:
        - Workflow
    quotaType:
      type: string
      enum:
        - MAX_VOTES_PER_WORKFLOW

UserQuotaBase:
  type: object
  properties:
    scope:
      type: string
      enum:
        - User
    quotaType:
      type: string
      enum:
        - MAX_ROLES_PER_USER

OrgQuotaCreate:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - $ref: "#/OrgQuotaBase"

GroupQuotaCreate:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - $ref: "#/GroupQuotaBase"

SpaceQuotaCreate:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - $ref: "#/SpaceQuotaBase"

WorkflowTemplateQuotaCreate:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - $ref: "#/WorkflowTemplateQuotaBase"

WorkflowQuotaCreate:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - $ref: "#/WorkflowQuotaBase"

UserQuotaCreate:
  allOf:
    - $ref: "#/QuotaBaseNew"
    - $ref: "#/UserQuotaBase"

QuotaCreate:
  oneOf:
    - $ref: "#/OrgQuotaCreate"
    - $ref: "#/GroupQuotaCreate"
    - $ref: "#/SpaceQuotaCreate"
    - $ref: "#/WorkflowTemplateQuotaCreate"
    - $ref: "#/WorkflowQuotaCreate"
    - $ref: "#/UserQuotaCreate"
  discriminator:
    propertyName: scope
    mapping:
      Org: "#/OrgQuotaCreate"
      Group: "#/GroupQuotaCreate"
      Space: "#/SpaceQuotaCreate"
      WorkflowTemplate: "#/WorkflowTemplateQuotaCreate"
      Workflow: "#/WorkflowQuotaCreate"
      User: "#/UserQuotaCreate"

QuotaUpdate:
  type: object
  properties:
    limit:
      type: integer
      minimum: 0
      description: The maximum value allowed for this quota

OrgQuota:
  allOf:
    - $ref: "#/QuotaBase"
    - $ref: "#/OrgQuotaBase"

GroupQuota:
  allOf:
    - $ref: "#/QuotaBase"
    - $ref: "#/GroupQuotaBase"

SpaceQuota:
  allOf:
    - $ref: "#/QuotaBase"
    - $ref: "#/SpaceQuotaBase"

WorkflowTemplateQuota:
  allOf:
    - $ref: "#/QuotaBase"
    - $ref: "#/WorkflowTemplateQuotaBase"

WorkflowQuota:
  allOf:
    - $ref: "#/QuotaBase"
    - $ref: "#/WorkflowQuotaBase"

UserQuota:
  allOf:
    - $ref: "#/QuotaBase"
    - $ref: "#/UserQuotaBase"

Quota:
  oneOf:
    - $ref: "#/OrgQuota"
    - $ref: "#/GroupQuota"
    - $ref: "#/SpaceQuota"
    - $ref: "#/WorkflowTemplateQuota"
    - $ref: "#/WorkflowQuota"
    - $ref: "#/UserQuota"
  discriminator:
    propertyName: scope
    mapping:
      Org: "#/OrgQuota"
      Group: "#/GroupQuota"
      Space: "#/SpaceQuota"
      WorkflowTemplate: "#/WorkflowTemplateQuota"
      Workflow: "#/WorkflowQuota"
      User: "#/UserQuota"

ListQuotasParams:
  type: object
  properties:
    page:
      type: integer
      default: 1
      description: Page number for pagination (1-indexed)
    limit:
      type: integer
      default: 20
      description: Number of results per page
    scope:
      $ref: "#/QuotaScope"
    targetId:
      type: string
      format: uuid
      description: Filter by target identifier
    quotaType:
      $ref: "#/QuotaType"
