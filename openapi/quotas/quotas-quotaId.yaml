parameters:
  - name: quotaId
    in: path
    required: true
    description: The unique identifier of the quota
    schema:
      type: string
      format: uuid

get:
  tags:
    - Quotas
  summary: Get a quota
  description: Retrieve a specific quota by its ID.
  operationId: getQuota
  security:
    - bearerAuth: []
  responses:
    "200":
      description: The requested quota
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/Quota
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      $ref: ../shared/responses.yaml#/NotFound

patch:
  tags:
    - Quotas
  summary: Partially update a quota
  description: Update properties of an existing quota (e.g. limit).
  operationId: patchQuota
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/QuotaUpdate
  responses:
    "200":
      description: Quota updated successfully
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/Quota
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      $ref: ../shared/responses.yaml#/NotFound

delete:
  tags:
    - Quotas
  summary: Delete a quota
  description: Delete a specific quota by its ID.
  operationId: deleteQuota
  security:
    - bearerAuth: []
  responses:
    "204":
      description: Quota deleted successfully
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
