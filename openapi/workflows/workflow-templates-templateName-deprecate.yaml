post:
  summary: Deprecate a workflow template
  description: Marks a workflow template as deprecated with optional workflow cancellation
  operationId: deprecateWorkflowTemplate
  tags:
    - Workflow Templates
  parameters:
    - name: templateName
      in: path
      required: true
      description: The name of the workflow template to deprecate
      schema:
        type: string
  requestBody:
    description: Options for deprecating a workflow template.
    required: false
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/WorkflowTemplateDeprecate
  responses:
    "200":
      description: Workflow template deprecated successfully
      content:
        application/json:
          schema:
            $ref: ./schemas.yaml#/WorkflowTemplate
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      $ref: ../shared/responses.yaml#/NotFound
