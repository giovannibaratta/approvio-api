post:
  summary: Vote on a workflow
  description: Allows an authenticated entity to cast a vote (approve or veto) on a specific workflow.
  operationId: voteOnWorkflow
  tags:
    - Workflow Actions
  parameters:
    - name: workflowId
      in: path
      required: true
      description: The unique identifier of the workflow
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/WorkflowVoteRequest
  responses:
    "200":
      description: Vote cast successfully. Returns updated workflow details.
      content:
        application/json:
          schema:
            type: object
    "400":
      description: Invalid request (e.g., voter not authorized, invalid vote type/mode).
      content:
        application/json:
          schema:
            $ref: ../shared/schemas.yaml#/APIError
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      $ref: ../shared/responses.yaml#/NotFound
