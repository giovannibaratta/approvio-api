delete:
  summary: Delete a workflow template
  description: Deletes a workflow template by its name. It will delete all the revisions, all the associated workflows, and stop all the ongoing actions gracefully.
  operationId: deleteWorkflowTemplate
  tags:
    - Workflow Templates
  parameters:
    - name: templateName
      in: path
      required: true
      description: The name of the workflow template to delete
      schema:
        type: string
  responses:
    "204":
      description: Workflow template deleted successfully or did not exist.
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
