post:
  summary: Create a new user
  description: Creates a new user in the system.
  operationId: createUser
  tags:
    - Users
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/UserCreate
  responses:
    "201":
      description: User created successfully
      headers:
        Location:
          description: URL of the created user
          schema:
            type: string
            format: uri
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "409":
      description: User with this email already exists
      content:
        application/json:
          schema:
            $ref: ../shared/schemas.yaml#/APIError
get:
  summary: List users
  description: Returns a list of users
  operationId: listUsers
  tags:
    - Users
  parameters:
    - name: search
      in: query
      description: Fuzzy search term for user display name or email.
      required: false
      schema:
        type: string
    - name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        default: 1
    - name: limit
      in: query
      description: Number of results per page
      schema:
        type: integer
        default: 20
  responses:
    "200":
      description: List of users
      content:
        application/json:
          schema:
            type: object
            required:
              - users
              - pagination
            properties:
              users:
                type: array
                items:
                  $ref: ./schemas.yaml#/UserSummary
              pagination:
                $ref: ../shared/schemas.yaml#/Pagination
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
