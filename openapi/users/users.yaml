post:
  summary: Create a new user
  description: Creates a new user in the system.
  operationId: createUser
  tags:
    - Users
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ./schemas.yaml#/UserCreate
  responses:
    "201":
      description: User created successfully
      headers:
        Location:
          description: URL of the created user
          schema:
            type: string
            format: uri
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "409":
      description: User with this email already exists
      content:
        application/json:
          schema:
            $ref: ../shared/schemas.yaml#/APIError
get:
  summary: List users
  description: Returns a list of users
  operationId: listUsers
  tags:
    - Users
  parameters:
    - name: params
      in: query
      style: form
      explode: true
      schema:
        $ref: ./schemas.yaml#/ListUsersParams
  responses:
    "200":
      description: List of users
      content:
        application/json:
          schema:
            type: object
            required:
              - users
              - pagination
            properties:
              users:
                type: array
                items:
                  $ref: ./schemas.yaml#/UserSummary
              pagination:
                $ref: ../shared/schemas.yaml#/Pagination
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
