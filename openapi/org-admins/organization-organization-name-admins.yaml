post:
  summary: Add organization administrator
  description: Adds a new organization administrator by email to the specified organization
  operationId: addOrganizationAdminToOrg
  tags:
    - Organization Admins
  parameters:
    - name: organization-name
      in: path
      required: true
      description: The name or identifier of the organization
      schema:
        type: string
        example: my-org
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../shared/schemas.yaml#/OrganizationAdminCreate
  responses:
    "201":
      description: Organization admin added successfully
      headers:
        Location:
          description: URL of the created organization admin
          schema:
            type: string
            format: uri
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      description: Organization not found
      content:
        application/json:
          schema:
            $ref: ../shared/schemas.yaml#/APIError
    "409":
      description: Admin with this email already exists in this organization
      content:
        application/json:
          schema:
            $ref: ../shared/schemas.yaml#/APIError
get:
  summary: List organization administrators
  description: Returns a list of administrators for the specified organization
  operationId: listOrganizationAdminsForOrg
  tags:
    - Organization Admins
  parameters:
    - name: organization-name
      in: path
      required: true
      description: The name or identifier of the organization
      schema:
        type: string
        example: my-org
    - name: page
      in: query
      description: Page number for pagination (1-indexed)
      schema:
        type: integer
        default: 1
    - name: limit
      in: query
      description: Number of results per page
      schema:
        type: integer
        default: 20
  responses:
    "200":
      description: List of organization admins for the specified organization
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - pagination
            properties:
              data:
                type: array
                items:
                  $ref: ../shared/schemas.yaml#/OrganizationAdmin
              pagination:
                $ref: ../shared/schemas.yaml#/Pagination
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      description: Organization not found
      content:
        application/json:
          schema:
            $ref: ../shared/schemas.yaml#/APIError
delete:
  summary: Remove organization administrator
  description: Removes an organization administrator from the specified organization
  operationId: removeOrganizationAdminFromOrg
  tags:
    - Organization Admins
  parameters:
    - name: organization-name
      in: path
      required: true
      description: The name or identifier of the organization
      schema:
        type: string
        example: my-org
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../shared/schemas.yaml#/OrganizationAdminRemove
  responses:
    "204":
      description: Organization admin removed successfully
    "400":
      $ref: ../shared/responses.yaml#/BadRequest
    "401":
      $ref: ../shared/responses.yaml#/Unauthorized
    "404":
      $ref: ../shared/responses.yaml#/NotFound
